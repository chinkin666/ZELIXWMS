# ============================================================
# Nginx configuration for ZELIXWMS frontend
# ZELIXWMS フロントエンド用 Nginx 設定
# ============================================================
# - SPA routing: all paths → index.html
# - API proxy: /api/* → backend service
# - SPA ルーティング: 全パスを index.html へ
# - API プロキシ: /api/* → バックエンドサービス
# ============================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression / Gzip 圧縮
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # API proxy to backend service
    # API リクエストをバックエンドサービスにプロキシ
    location /api/ {
        proxy_pass http://backend:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed) / WebSocket サポート
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeout settings / タイムアウト設定
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint / ヘルスチェック用プロキシ
    location /health {
        proxy_pass http://backend:4000;
        proxy_set_header Host $host;
    }

    # Static file caching / 静的ファイルのキャッシュ
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: all other routes → index.html
    # SPA フォールバック: その他の全ルートを index.html へ
    location / {
        try_files $uri $uri/ /index.html;
    }
}
