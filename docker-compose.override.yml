# ============================================================
# Docker Compose Override - 開発環境用 / 开发环境用
# ============================================================
# このファイルは docker compose up 時に自動的にマージされます。
# 此文件在 docker compose up 时会自动合并。
#
# 本番環境ではこのファイルを削除またはリネームしてください。
# 生产环境请删除或重命名此文件。
# ============================================================

services:
  backend:
    environment:
      - NODE_ENV=development

  mongo:
    ports:
      - "27017:27017"

  redis:
    ports:
      - "6379:6379"
