# ============================================================
# Docker Compose - ZELIXWMS 出荷管理システム / 出货管理系统
# ============================================================
# Services: backend (NestJS), frontend, admin, portal, postgres, redis
# サービス: バックエンド(NestJS), 仓库前端, 管理端, 客户门户, PostgreSQL, Redis
# ============================================================
# Usage / 使い方:
#   docker compose up -d          # Start all services / 全サービス起動
#   docker compose down           # Stop all services / 全サービス停止
#   docker compose logs -f        # View logs / ログ確認
#   docker compose ps             # Check status / ステータス確認
# ============================================================

services:
  # Nginx リバースプロキシ（統一エントリポイント）/ Nginx 反向代理（统一入口）
  nginx:
    build: ./nginx
    ports:
      - "80:80"
      # 将来の SSL 用 / 未来 SSL 用
      # - "443:443"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
      admin:
        condition: service_started
      portal:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - internal

  # NestJS Backend API server / NestJS バックエンド API サーバー
  backend:
    build: ./backend-nest
    ports:
      - "4100:4100"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=4100
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/zelixwms
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-replace-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - internal

  # Warehouse Frontend (Nginx + Vue SPA) / 仓库端フロントエンド
  # ポート公開は nginx 経由 / 端口通过 nginx 暴露
  frontend:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_ORIGIN: ""
        VITE_BACKEND_API_PREFIX: /api
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - internal

  # Admin Dashboard / 管理端ダッシュボード
  # ポート公開は nginx 経由 / 端口通过 nginx 暴露
  admin:
    build:
      context: ./admin
      args:
        VITE_BACKEND_ORIGIN: ""
        VITE_BACKEND_API_PREFIX: /api
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - internal

  # Client Portal / 客户门户
  # ポート公開は nginx 経由 / 端口通过 nginx 暴露
  portal:
    build:
      context: ./portal
      args:
        VITE_BACKEND_ORIGIN: ""
        VITE_BACKEND_API_PREFIX: /api
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - internal

  # PostgreSQL database / PostgreSQL 数据库
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: zelixwms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # 開発時のみ公開 / 仅开发时暴露
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zelixwms"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - internal

  # Redis cache + BullMQ job queue / Redis キャッシュ + BullMQ ジョブキュー
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - redis-data:/data
    # 本番ではポート公開不要 / 生产环境不暴露端口
    # ports:
    #   - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
