# ============================================================
# Docker Compose - ZELIXWMS 出荷管理システム
# ============================================================
# Services: backend, frontend, admin, portal, mongo, redis
# サービス: バックエンド, 仓库前端, 管理端, 客户门户, MongoDB, Redis
# ============================================================
# Usage / 使い方:
#   docker compose up -d          # Start all services / 全サービス起動
#   docker compose down           # Stop all services / 全サービス停止
#   docker compose logs -f        # View logs / ログ確認
#   docker compose ps             # Check status / ステータス確認
# ============================================================

services:
  # Backend API server / バックエンド API サーバー
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - HOST=0.0.0.0
      - MONGODB_URI=mongodb://mongo:27017/nexand-shipment
      - MONGODB_DB=nexand-shipment
      - REDIS_URL=redis://redis:6379
      - SESSION_SECRET=${SESSION_SECRET:-replace-me-in-production}
      - JWT_SECRET=${JWT_SECRET:-replace-me-in-production}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - internal

  # Warehouse Frontend (Nginx + Vue SPA) / 仓库端フロントエンド
  frontend:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_ORIGIN: ""
        VITE_BACKEND_API_PREFIX: /api
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - internal

  # Admin Dashboard / 管理端ダッシュボード
  admin:
    build:
      context: ./admin
      args:
        VITE_BACKEND_ORIGIN: ""
        VITE_BACKEND_API_PREFIX: /api
    ports:
      - "3001:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - internal

  # Client Portal / 客户门户
  portal:
    build:
      context: ./portal
      args:
        VITE_BACKEND_ORIGIN: ""
        VITE_BACKEND_API_PREFIX: /api
    ports:
      - "3002:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - internal

  # MongoDB database / MongoDB データベース
  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    # 本番ではポート公開不要（内部通信のみ）/ 本番ではポート公開不要
    # 开发时取消注释 / 開発時はコメント解除
    # ports:
    #   - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - internal

  # Redis cache + BullMQ job queue / Redis キャッシュ + BullMQ ジョブキュー
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    # 本番ではポート公開不要 / 生产环境不暴露端口
    # ports:
    #   - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  mongo-data:
  redis-data:
