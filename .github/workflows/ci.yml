# CI/CD パイプライン / CI/CD 流水线
# 每次 push 和 PR 运行测试，main 分支额外运行构建
# プッシュとPRごとにテスト実行、mainブランチでは追加でビルド実行

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# 同一ブランチの重複実行をキャンセル / 取消同一分支的重复执行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ════════════════════════════════════════════════════════════
  # テストジョブ: 全 push・PR で実行
  # 测试任务: 所有 push 和 PR 触发
  # ════════════════════════════════════════════════════════════
  test:
    name: Test (TypeCheck + Unit Tests)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ─── 依赖安装（ルートワークスペース）/ 安装依赖（根工作区）───
      - name: Install dependencies
        run: npm ci

      # ─── 后端テスト / バックエンドテスト ───
      - name: Backend - TypeCheck
        run: npx tsc --project tsconfig.json --noEmit
        working-directory: backend

      - name: Backend - Unit Tests
        run: npx vitest run
        working-directory: backend

      # ─── NestJS バックエンドテスト / NestJS后端测试 ───
      - name: NestJS Backend - Build
        run: npx nest build
        working-directory: backend-nest

      - name: NestJS Backend - Unit Tests
        run: npx jest --passWithNoTests
        working-directory: backend-nest

      # ─── 仓库端テスト / 倉庫フロントエンドテスト ───
      - name: Frontend - Unit Tests
        run: npx vitest run
        working-directory: frontend

      - name: Frontend - TypeCheck
        run: npx vue-tsc --build
        working-directory: frontend

      # ─── 管理端型チェック / Admin 类型检查 ───
      - name: Admin - TypeCheck
        run: npx vue-tsc --build
        working-directory: admin

      # ─── 客户门户型チェック / Portal 类型检查 ───
      - name: Portal - TypeCheck
        run: npx vue-tsc --build
        working-directory: portal

  # ════════════════════════════════════════════════════════════
  # ビルドジョブ: main ブランチのみ、テスト成功後に実行
  # 构建任务: 仅 main 分支，测试通过后执行
  # ════════════════════════════════════════════════════════════
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ─── 依赖安装 / 依存関係インストール ───
      - name: Install dependencies
        run: npm ci

      # ─── 后端构建 / バックエンドビルド ───
      - name: Backend - Build
        run: npm run build
        working-directory: backend

      # ─── NestJS 构建 / NestJS ビルド ───
      - name: NestJS Backend - Build
        run: npx nest build
        working-directory: backend-nest

      # ─── 仓库端构建 / 倉庫フロントエンドビルド ───
      - name: Frontend - Build
        run: npm run build-only
        working-directory: frontend

      # ─── 管理端构建 / Adminビルド ───
      - name: Admin - Build
        run: npm run build
        working-directory: admin

      # ─── 客户门户构建 / Portalビルド ───
      - name: Portal - Build
        run: npm run build
        working-directory: portal
