name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── 后端 / バックエンド ───
  backend:
    name: Backend (TypeCheck + Test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        working-directory: backend
      - name: TypeCheck
        run: npx tsc --noEmit
        working-directory: backend
      - name: Test
        run: npx vitest run
        working-directory: backend

  # ─── Plugin SDK ───
  plugin-sdk:
    name: Plugin SDK (Build + Test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        working-directory: packages/plugin-sdk
      - name: Build
        run: npx tsc
        working-directory: packages/plugin-sdk
      - name: Test
        run: npx vitest run
        working-directory: packages/plugin-sdk

  # ─── 插件测试 / プラグインテスト ───
  plugins:
    name: Plugins Test
    runs-on: ubuntu-latest
    needs: plugin-sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        working-directory: packages/plugin-sdk
      - run: npx tsc
        working-directory: packages/plugin-sdk
      - name: Test all plugins
        run: npx vitest run extensions/plugins
        working-directory: .

  # ─── 仓库端 / 倉庫フロントエンド ───
  frontend:
    name: Frontend (TypeCheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        working-directory: frontend
      - name: TypeCheck
        run: npx vue-tsc --noEmit
        working-directory: frontend

  # ─── 管理端 / Admin ───
  admin:
    name: Admin (TypeCheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        working-directory: admin
      - name: TypeCheck
        run: npx vue-tsc --noEmit
        working-directory: admin

  # ─── 客户门户 / Portal ───
  portal:
    name: Portal (TypeCheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        working-directory: portal
      - name: TypeCheck
        run: npx vue-tsc --noEmit
        working-directory: portal
