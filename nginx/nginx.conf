# ============================================================
# Nginx Reverse Proxy - ZELIXWMS
# リバースプロキシ設定 / 反向代理配置
# ============================================================
# 全サービスの単一エントリポイント / 所有服务的统一入口
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ログフォーマット / 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ファイルアップロード上限 / 文件上传大小限制 (20MB)
    client_max_body_size 20m;

    # gzip 圧縮 / gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # アップストリーム定義 / 上游服务定义
    upstream backend_api {
        server backend:4100;
    }

    upstream frontend_app {
        server frontend:80;
    }

    upstream admin_app {
        server admin:80;
    }

    upstream portal_app {
        server portal:80;
    }

    server {
        listen 80;
        server_name _;

        # --- セキュリティヘッダー / 安全响应头 ---
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # --- 共通プロキシ設定 / 通用代理设置 ---
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket サポート（将来のリアルタイム機能用）/ WebSocket 支持（未来实时功能用）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # --- バックエンド API ルーティング / 后端 API 路由 ---
        location /api/ {
            proxy_pass http://backend_api;
        }

        # ヘルスチェック / 健康检查
        location /health {
            proxy_pass http://backend_api;
        }

        # --- 管理端ダッシュボード / 管理端仪表盘 ---
        location /admin/ {
            proxy_pass http://admin_app/;
        }

        # 管理端の静的アセット / 管理端静态资源
        location /admin {
            return 301 /admin/;
        }

        # --- 客户门户 / クライアントポータル ---
        location /portal/ {
            proxy_pass http://portal_app/;
        }

        # ポータルリダイレクト / 门户重定向
        location /portal {
            return 301 /portal/;
        }

        # --- 仓库端フロントエンド（デフォルト）/ 仓库前端（默认）---
        location / {
            proxy_pass http://frontend_app;
        }
    }

    # --- 将来の SSL 設定用テンプレート / 未来 SSL 配置模板 ---
    # server {
    #     listen 443 ssl http2;
    #     server_name _;
    #
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #
    #     # 上記 location ブロックと同じ設定 / 与上面 location 块相同的配置
    # }
}
